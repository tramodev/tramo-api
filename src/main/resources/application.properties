spring.config.import=optional:file:.env[.properties]

spring.application.name=tramo-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/mypath
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Requires mail.tramo.dev verified as a domain in Resend (DNS records added there) before this works.
app.mail.from=contact@mail.tramo.dev
# Set MAIL_ENABLED=false in your local .env to skip real sends and just log the verification/reset link instead.
app.mail.enabled=${MAIL_ENABLED:true}
app.frontend-url=http://localhost:3000

app.google.client-id=${GOOGLE_CLIENT_ID}

app.jwt.secret=${JWT_SECRET}

app.project-id.salt=${PROJECT_ID_SALT}

app.r2.account-id=${R2_ACCOUNT_ID}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET}
app.r2.bucket=${R2_BUCKET}
app.r2.public-base-url=${R2_PUBLIC_BASE_URL}
