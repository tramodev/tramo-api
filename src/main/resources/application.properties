spring.config.import=optional:file:.env[.properties]

spring.application.name=mypath-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/mypath
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Resend's shared sandbox sender - works without verifying a custom domain.
# Swap to a verified domain address once one is set up in Resend.
app.mail.from=onboarding@resend.dev
app.frontend-url=http://localhost:3000

app.google.client-id=${GOOGLE_CLIENT_ID}

app.jwt.secret=${JWT_SECRET}
